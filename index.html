<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Shitting Pigeon</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #14161f;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #14161f;
      }
      canvas {
        image-rendering: auto;
      }
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #14161f;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #f3ead8;
        font-family: monospace;
        font-size: 20px;
        line-height: 2;
      }
      #rotate-overlay .icon {
        font-size: 48px;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-overlay">
      <div><span class="icon">&#8635;</span><br />Rotate your phone</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
