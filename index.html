<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pigeon Drop</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #14161f;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #14161f;
      }
      canvas {
        image-rendering: auto;
      }
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #14161f;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #f3ead8;
        font-family: monospace;
        font-size: 20px;
        line-height: 2;
      }
      #rotate-overlay .icon {
        font-size: 48px;
      }
      #rotate-overlay .tip {
        font-size: 13px;
        opacity: 0.65;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-overlay">
      <div>
        <span class="icon">&#8635;</span><br />
        <span id="rotate-text">Rotate your phone</span><br />
        <span class="tip" id="rotate-tip">Auto-rotate needs to be on</span>
      </div>
    </div>
    <script>
      // the overlay must work before the game bundle loads, so it carries
      // its own translations (keep in sync with src/i18n.ts languages)
      (function () {
        var msgs = {
          es: ['Gira el teléfono', 'Activa la rotación automática'],
          fr: ['Tourne ton téléphone', 'Active la rotation automatique'],
          de: ['Dreh dein Handy', 'Automatisches Drehen muss an sein'],
          it: ['Ruota il telefono', 'Attiva la rotazione automatica'],
          pt: ['Gire o celular', 'Ative a rotação automática'],
          ru: ['Поверни телефон', 'Включи автоповорот экрана'],
          uk: ['Поверни телефон', 'Увімкни автоповорот екрана'],
          ja: ['スマホを横にしてね', '自動回転をオンにしてね'],
          zh: ['请横屏使用', '请开启自动旋转'],
          ko: ['휴대폰을 돌려주세요', '자동 회전을 켜주세요'],
        };
        var langs = [new URLSearchParams(location.search).get('lang')]
          .concat(navigator.languages || [navigator.language]);
        for (var i = 0; i < langs.length; i++) {
          var key = langs[i] && langs[i].toLowerCase().split('-')[0];
          if (key === 'en') break;
          if (msgs[key]) {
            document.getElementById('rotate-text').textContent = msgs[key][0];
            document.getElementById('rotate-tip').textContent = msgs[key][1];
            break;
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
